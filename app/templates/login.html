<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <style>
    body{font-family:Calibri,Arial,sans-serif;background:#f4f7fb;margin:0;padding:20px;color:#1e2a39}
    .card{max-width:460px;margin:40px auto;background:#fff;border:1px solid #d9e2ec;border-radius:10px;padding:16px}
    input,select{width:100%;padding:10px;border:1px solid #c7d5e2;border-radius:8px;margin:6px 0}
    button{background:#fff;color:#0d3b66;border:1px solid #d9e2ec;border-radius:8px;padding:10px 14px;cursor:pointer}
    .row{display:flex;gap:8px;align-items:center}
    a{color:#0d3b66;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <h3>Login</h3>
    <form method="post" action="/auth-login">
      <label>Rolle</label>
      <select name="scope">
        <option value="admin">Admin</option>
        <option value="i18n">Lokalisierer</option>
      </select>

      <label>Sprache (nur Lokalisierer)</label>
      <select name="lang">
        {% for l in langs %}<option value="{{ l }}" {% if l==selected_lang %}selected{% endif %}>{{ l|upper }}</option>{% endfor %}
      </select>

      <label>Passwort</label>
      <input type="password" name="password" required />

      <div class="row" style="margin-top:10px;">
        <button type="submit">Login</button>
        <a href="/">Zurück</a>
      </div>
    </form>
  </div>
</body>
</html>
