<script>
  (function(){
    const labels = {
      de: 'Konfiguration',
      en: 'Configuration',
      it: 'Configurazione',
      fr: 'Configuration',
      pt: 'Configuração',
      es: 'Configuración'
    };

    const resolveLang = () => {
      const qLang = (new URLSearchParams(window.location.search).get('lang') || '').toLowerCase();
      const cLang = decodeURIComponent(((document.cookie.match(/(?:^|; )rolemapper_lang=([^;]+)/)||[])[1] || '')).toLowerCase();
      const sLang = (localStorage.getItem('rolemapper_lang') || '').toLowerCase();
      const sw = document.getElementById('langSwitch');
      const wLang = (sw && sw.value ? String(sw.value) : '').toLowerCase();
      return labels[wLang] ? wLang : (labels[qLang] ? qLang : (labels[cLang] ? cLang : (labels[sLang] ? sLang : 'de')));
    };

    const applyConfigLabel = () => {
      const lang = resolveLang();
      document.querySelectorAll('[data-i18n="nav.config"]').forEach((el) => {
        el.textContent = labels[lang] || labels.de;
      });
    };

    applyConfigLabel();
    const sw = document.getElementById('langSwitch');
    if (sw) sw.addEventListener('change', () => setTimeout(applyConfigLabel, 0));
    window.addEventListener('pageshow', applyConfigLabel);
  })();
</script>
